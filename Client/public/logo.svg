<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Outer thin square frame -->
  <rect x="8" y="8" width="48" height="48" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" transform="rotate(-12 32 32)" />
  
  <!-- Thick purple diamond - enlarged and thickened to fill the tab space -->
  <rect x="10" y="10" width="44" height="44" fill="#000000" stroke="#822cff" stroke-width="5" transform="rotate(45 32 32)" />
  
  <!-- Central 'B' character - shifted and bolded for tab clarity -->
  <text x="31" y="41" fill="#ffffff" font-family="sans-serif" font-weight="900" font-style="italic" font-size="26" text-anchor="middle">B</text>
</svg>
